services:
  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env.local
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/config" ]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - data_volume:/app/data
      - db_volume:/app/auditor_db

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always

volumes:
  data_volume:
  db_volume:
